<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- A highly sophisticated, rich emerald gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />   <!-- Vibrant green -->
      <stop offset="40%" stop-color="#059669" />  <!-- Darker emerald green -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Bright blue tip -->
    </linearGradient>
    
    <!-- Subtle, elegant drop shadow for depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#022c22" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Classy, elegant Z using high-end serif fonts with a full gradient fill -->
  <text x="50" y="85" 
        font-family="'Playfair Display', Didot, 'Bodoni MT', Georgia, 'Times New Roman', serif" 
        font-size="115" 
        font-style="italic" 
        font-weight="900" 
        text-anchor="middle" 
        fill="url(#emeraldGrad)" 
        filter="url(#softShadow)">Z</text>
</svg>
